<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-section {
            text-align: center;
            margin-bottom: 40px;
        }

        input[type="text"] {
            padding: 15px 20px;
            width: 360px;
            border: 2px solid #d9d9d9;
            border-radius: 25px;
            outline: none;
            background-color: white;
            font-size: 1rem;
            color: #2c3e50;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select {
            padding: 15px 20px;
            width: 260px;
            border: 2px solid #d9d9d9;
            border-radius: 25px;
            outline: none;
            margin-left: 10px;
            background-color: white;
            color: #2c3e50;
            font-size: 1rem;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        select option {
            padding: 12px;
            background-color: white;
            color: #2c3e50;
        }

        .search-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        #resultsTitle {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 40px 0 30px 0;
            letter-spacing: 0.5px;
            line-height: 1.2;
            text-shadow: 0 1px 1px rgba(0,0,0,0.03);
        }

        button {
            padding: 15px 28px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.15s, opacity 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        button:disabled { background-color: #ccc; }

        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin: 20px;
        }

        .book-card h3 {
            font-size: 1rem;
            margin: 10px 0 5px 0;
            color: var(--primary);
            height: 2.4em;
            overflow: hidden;
        }

        .book-card {
            position: relative;
            cursor: pointer;
        }

        .book-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 2;
        }

        .icon-btn {
            background: transparent;
            border: none;
            outline: none;
            padding: 0;
            cursor: pointer;
            box-shadow: none;
            border-radius: 0;
        }

        .icon-btn:hover {
            transform: none;
            opacity: 1;
        }

        .icon-btn img {
            width: 22px;
            height: 22px;
            display: block;
            object-fit: contain;
        }

        .icon-btn.active {
            transform: scale(1.08);
        }

        .title-row {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 6px;
            width: 100%;
            margin-top: 10px;
        }

        .title-row .fav-btn {
            flex: 0 0 auto;
            margin-top: 2px;
        }

        .title-row h3 {
            margin: 0;
            flex: 1;
            text-align: left;
            height: auto;
            overflow: visible;
            line-height: 1.3;
        }

       
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        #pageIndicator { font-weight: bold; }
          .modal-box {
        background-color: #ffffff !important;
        color: #333 !important;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 400px;
       
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); 
        border: 1px solid #f0f0f0;
        text-align: center;
    }

    .modal-box h2 {
        margin-bottom: 20px;
        font-family: sans-serif;
    }

  
    .modal-box input {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        margin-bottom: 15px;
    }

    </style>
  </head>
<body>
  <nav>   <button id="nav-login-btn">Login</button></nav>
  <div id="auth-modal-overlay" style="display: none;">
    <div class="modal-box">
        <div id="login-form-container">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button id="submit-login">Sign In</button>
            <p>New? <span id="link-to-signup" style="color:blue; cursor:pointer">Sign Up</span></p>
        </div>

        <div id="signup-form-container" style="display: none;">
            <h2>Sign Up</h2>
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button id="submit-signup">Register</button>
            <p>Back to <span id="link-to-login" style="color:blue; cursor:pointer">Login</span></p>
        </div>
        <button id="close-modal-btn">Close</button>
    </div>
</div>

<div class="container">
    <div class="search-section">
    <h1>LUME</h1>
    <div class="search-controls">
        <input type="text" id="searchInput" placeholder="Search by title...">
        <select id="genreFilter">
            <option value="">All Genres</option>
            <option value="fantasy">Fantasy</option>
            <option value="science fiction">Science Fiction</option>
            <option value="romance">Romance</option>
            <option value="mystery">Mystery</option>
            <option value="horror">Horror</option>
            <option value="history">History</option>
            <option value="biography">Biography</option>
            <option value="adventure">Adventure</option>
            <option value="thriller">Thriller</option>
            <option value="young adult">Young Adult</option>
        </select>
        <button onclick="newSearch()">Search</button>
    </div>
</div>
<h2 id="resultsTitle">Trending Books</h2>
    <div id="gallery" class="gallery"></div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageIndicator">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
   

    </div>
</div>
<script>

</body>
<script type="module">
    import firebaseConfig  from "./firebaseConfig.js";
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

   
    import {
     getAuth,
     createUserWithEmailAndPassword,
     signInWithEmailAndPassword,
     signOut,
     onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

   
    import {
        getFirestore,
        doc,
        setDoc,
        getDocs,
        deleteDoc,
        collection,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); 
    const db = getFirestore(app);


    let currentPage = 1;
    let currentQuery = "";
    let currentGenre = "";
    let searchTimer;
    let currentController = null;
    let latestRequestId = 0;
    let currentMode = "trending";
    const limit = 12; 

    async function fetchBooks(query, page, genre = "") {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p>Searching for books...</p>";

        const hasText = query.trim() !== "";
        const hasGenre = genre.trim() !== "";
        const offset = (page - 1) * limit;

        const requestId = ++latestRequestId;

        if (currentController) {
            currentController.abort();
        }

        currentController = new AbortController();

        let url = "";

        if (!hasText && !hasGenre) {
            currentMode = "trending";
            url = `https://openlibrary.org/trending/daily.json?limit=${limit}&offset=${offset}`;
        } else if (!hasText && hasGenre) {
            currentMode = "subject";
            url = `https://openlibrary.org/subjects/${encodeURIComponent(genre.toLowerCase())}.json?limit=${limit}&offset=${offset}`;
        } else {
            currentMode = "search";
            const finalQuery = buildSearchQuery(query, genre);
            url = `https://openlibrary.org/search.json?q=${encodeURIComponent(finalQuery)}&page=${page}&limit=${limit}`;
        }

        try {
            const response = await fetch(url, { signal: currentController.signal });
            const data = await response.json();

            if (requestId !== latestRequestId) return;

            let books = [];
            let totalResults = 0;

            if (currentMode === "search") {
                books = data.docs || [];
                totalResults = data.numFound || books.length;
            } else {
                books = data.works || [];
                totalResults = data.work_count || books.length;
            }

            renderGallery(books);
            updatePaginationUI(totalResults);
            updateResultsTitle();
        } catch (error) {
            if (error.name !== "AbortError" && requestId === latestRequestId) {
                gallery.innerHTML = "<p>Error loading data. Please try again later.</p>";
            }
        }
    }

    let favouriteIds = new Set();
    let planToReadIds = new Set();

    function bookDocId(workKey) {
        return encodeURIComponent(workKey);
    }

    function clearUserLists() {
        favouriteIds.clear();
        planToReadIds.clear();
    }

    async function loadUserLists() {
        clearUserLists();

        const user = auth.currentUser;
        if (!user) return;

        const favSnap = await getDocs(collection(db, "users", user.uid, "favourites"));
        favSnap.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.workKey) {
                favouriteIds.add(data.workKey);
            }
        });

        const planSnap = await getDocs(collection(db, "users", user.uid, "planToRead"));
        planSnap.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.workKey) {
                planToReadIds.add(data.workKey);
            }
        });
    }

    function isSaved(type, workKey) {
        return type === "favourites"
            ? favouriteIds.has(workKey)
            : planToReadIds.has(workKey);
    }

    async function toggleSaved(type, bookData) {
        const user = auth.currentUser;

        if (!user) {
            alert("Please log in first.");
            openModal();
            return false;
        }

        const collectionName = type === "favourites" ? "favourites" : "planToRead";
        const docRef = doc(db, "users", user.uid, collectionName, bookDocId(bookData.workKey));
        const targetSet = type === "favourites" ? favouriteIds : planToReadIds;

        if (targetSet.has(bookData.workKey)) {
            await deleteDoc(docRef);
            targetSet.delete(bookData.workKey);
        } else {
            await setDoc(docRef, {
                ...bookData,
                savedAt: serverTimestamp()
            });
            targetSet.add(bookData.workKey);
        }

        return true;
    }

    function normalizeBook(book) {
        const coverId = book.cover_i || book.cover_id || null;
        const author =
            book.author_name?.[0] ||
            book.authors?.[0]?.name ||
            "Unknown Author";

        return {
            workKey: book.key,
            title: book.title || "Untitled",
            author: author,
            coverId: coverId
        };
    }

    function renderGallery(books) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "";

        if (!books || books.length === 0) {
            gallery.innerHTML = "<p>No books found.</p>";
            return;
        }

        books.forEach(book => {
            const bookData = normalizeBook(book);
            const coverUrl = bookData.coverId
                ? `https://covers.openlibrary.org/b/id/${bookData.coverId}-M.jpg`
                : 'https://via.placeholder.com/200x300?text=No+Cover';

            const favActive = isSaved("favourites", bookData.workKey);
            const planActive = isSaved("planToRead", bookData.workKey);

            const card = document.createElement('div');
            card.className = 'book-card';

            card.innerHTML = `
                <div class="book-actions">
                    <button class="icon-btn plan-btn ${planActive ? "active" : ""}" title="Plan to Read">
                        <img src="${planActive ? "BookMarkFilled.jpg" : "BookMarkOutline.png"}" alt="Plan to Read">
                    </button>
                </div>

                <img src="${coverUrl}" alt="${bookData.title}">

                <div class="title-row">
                    <button class="icon-btn fav-btn ${favActive ? "active" : ""}" title="Favourite">
                        <img src="${favActive ? "HeartFilled.jpg" : "HeartOutline.jpg"}" alt="Favourite">
                    </button>
                    <h3>${bookData.title}</h3>
                </div>

                <small>${bookData.author}</small>
            `;

            card.addEventListener("click", () => {
                openBookDetails(bookData);
            });

            const favBtn = card.querySelector(".fav-btn");
            const planBtn = card.querySelector(".plan-btn");

            favBtn.addEventListener("click", async (event) => {
                event.stopPropagation();
                const changed = await toggleSaved("favourites", bookData);
                if (changed) renderGallery(books);
            });

            planBtn.addEventListener("click", async (event) => {
                event.stopPropagation();
                const changed = await toggleSaved("planToRead", bookData);
                if (changed) renderGallery(books);
            });

            gallery.appendChild(card);
        });
    }

    function openBookDetails(bookData) {
        const state = {
            page: currentPage,
            query: currentQuery,
            genre: currentGenre,
            mode: currentMode
        };

        sessionStorage.setItem("lumeReturnState", JSON.stringify(state));
        sessionStorage.setItem("lumeSelectedBook", JSON.stringify(bookData));

        window.location.href = `/details.html?workKey=${encodeURIComponent(bookData.workKey)}`;
    }

    function updateResultsTitle() {
        const title = document.getElementById("resultsTitle");

        if (currentMode === "trending") {
            title.innerText = "Trending Books";
            title.style.display = "block";
        } else if (currentMode === "subject") {
            const genreName = currentGenre
                ? currentGenre.charAt(0).toUpperCase() + currentGenre.slice(1)
                : "Genre";
            title.innerText = `${genreName} Books`;
            title.style.display = "block";
        } else if (currentMode === "search") {
            title.style.display = "none";
        }
    }

   function updatePaginationUI(totalResults) {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        if (currentMode === "trending") {
            pageIndicator.innerText = "Trending";
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = true;
            return;
        }

        const totalPages = Math.ceil(totalResults / limit) || 1;
        pageIndicator.innerText = `Page ${currentPage} of ${totalPages}`;
        prevBtn.disabled = (currentPage === 1);
        nextBtn.disabled = (currentPage >= totalPages);
    }


    

  
    function newSearch() {
        currentQuery = document.getElementById('searchInput').value.trim();
        currentGenre = document.getElementById('genreFilter').value;
        currentPage = 1;
        fetchBooks(currentQuery, currentPage, currentGenre);
    }

    window.newSearch = newSearch; 

    document.getElementById("genreFilter").addEventListener("change", () => {
        newSearch();
    });

    document.getElementById("searchInput").addEventListener("input", () => {
        clearTimeout(searchTimer);

        searchTimer = setTimeout(() => {
            newSearch();
        }, 500);
    });

    function changePage(step) {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if ((step < 0 && prevBtn.disabled) || (step > 0 && nextBtn.disabled)) {
            return;
        }

        currentPage += step;
        fetchBooks(currentQuery, currentPage, currentGenre);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.changePage = changePage; 
    
    window.onload = () => {
        const savedState = JSON.parse(sessionStorage.getItem("lumeReturnState") || "null");

        if (savedState) {
            currentPage = savedState.page || 1;
            currentQuery = savedState.query || "";
            currentGenre = savedState.genre || "";
            currentMode = savedState.mode || "trending";

            document.getElementById("searchInput").value = currentQuery;
            document.getElementById("genreFilter").value = currentGenre;
        } else {
            currentPage = 1;
            currentQuery = document.getElementById('searchInput').value.trim();
            currentGenre = document.getElementById('genreFilter').value;
        }

        fetchBooks(currentQuery, currentPage, currentGenre);
    };

    const navBtn = document.getElementById('nav-login-btn');
    const modal = document.getElementById('auth-modal-overlay');
    const closeBtn = document.getElementById('close-modal-btn');
    const toSignupLink = document.getElementById('link-to-signup');
    const toLoginLink = document.getElementById('link-to-login');
    
    const loginView = document.getElementById('login-form-container');
    const signupView = document.getElementById('signup-form-container');

    
    const openModal = () => {
        modal.style.display = 'flex';
        modal.style.position = 'fixed';
        modal.style.inset = '0';
        modal.style.backgroundColor = 'rgba(255,255,255,0.95)';
        modal.style.zIndex = '10000';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
    };

    const closeModal = () => {
        modal.style.display = 'none';
    };

    
    navBtn.onclick = openModal;
    closeBtn.addEventListener('click', closeModal);

    toSignupLink.addEventListener('click', () => {
        loginView.style.display = 'none';
        signupView.style.display = 'block';
    });

    toLoginLink.addEventListener('click', () => {
        signupView.style.display = 'none';
        loginView.style.display = 'block';
    });

  
    document.getElementById('submit-login').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("Logged in!");
            closeModal();
        } catch (e) {
            alert(e.message);
        }
    });

    document.getElementById('submit-signup').addEventListener('click', async () => {
        const email = document.getElementById('signup-email').value;
        const pass = document.getElementById('signup-password').value;
        
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Account created!");
            closeModal();
        } catch (error) {
            alert("Sign Up Error: " + error.message);
        }
    });


    onAuthStateChanged(auth, async (user) => {
        if (user) {
            navBtn.innerText = "Logout";
            navBtn.onclick = () => signOut(auth);
        } else {
            navBtn.innerText = "Login";
            navBtn.onclick = openModal;
        }

        await loadUserLists();
        fetchBooks(currentQuery, currentPage, currentGenre);
    });

    function buildSearchQuery(query, genre) {
        const parts = [];

        if (query.trim()) {
            const words = query
                .trim()
                .toLowerCase()
                .split(/\s+/)
                .map(word => `${word}*`)
                .join(" AND ");

            parts.push(`title:(${words})`);
        }

        if (genre.trim()) {
            parts.push(`subject:"${genre.trim()}"`);
        }

        return parts.join(" AND ");
    }


    document.getElementById('close-modal-btn').onclick = closeModal;


</script>
</html>
