<script type="module">
    import firebaseConfig  from "./firebaseConfig.js";
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

   
    import {
     getAuth,
     createUserWithEmailAndPassword,
     signInWithEmailAndPassword,
     signOut,
     onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

   
    import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
        getDocs,
        deleteDoc,
        collection,
        runTransaction,
        serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); 
    const db = getFirestore(app);


    let currentPage = 1;
    let currentQuery = "";
    let currentGenre = "";
    let searchTimer;
    let currentController = null;
    let latestRequestId = 0;
    let currentMode = "trending";
    let currentListType = null;
    let currentModalBookData = null;
    let lastRenderedBooks = [];
    let ratingsMap = new Map();
    let ratingSummaryMap = new Map();
    
    const limit = 12; 

    async function fetchBooks(query, page, genre = "") {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p>Searching for books...</p>";

        const hasText = query.trim() !== "";
        const hasGenre = genre.trim() !== "";
        const offset = (page - 1) * limit;

        const requestId = ++latestRequestId;

        if (currentController) {
            currentController.abort();
        }

        currentController = new AbortController();

        let url = "";

        if (!hasText && !hasGenre) {
            currentMode = "trending";
            url = `https://openlibrary.org/trending/daily.json?limit=${limit}&offset=${offset}`;
        } else if (!hasText && hasGenre) {
            currentMode = "subject";
            url = `https://openlibrary.org/subjects/${encodeURIComponent(genre.toLowerCase())}.json?limit=${limit}&offset=${offset}`;
        } else {
            currentMode = "search";
            const finalQuery = buildSearchQuery(query, genre);
            url = `https://openlibrary.org/search.json?q=${encodeURIComponent(finalQuery)}&page=${page}&limit=${limit}`;
        }

        try {
            const response = await fetch(url, { signal: currentController.signal });
            const data = await response.json();

            if (requestId !== latestRequestId) return;

            let books = [];
            let totalResults = 0;

            if (currentMode === "search") {
                books = data.docs || [];
                totalResults = data.numFound || books.length;
            } else {
                books = data.works || [];
                totalResults = data.work_count || books.length;
            }

            lastRenderedBooks = books;
            await loadRatingSummaries(books);
            renderGallery(books);
            updatePaginationUI(totalResults);
            updateResultsTitle();
        } catch (error) {
            if (error.name !== "AbortError" && requestId === latestRequestId) {
                gallery.innerHTML = "<p>Error loading data. Please try again later.</p>";
            }
        }
    }

    let favouriteIds = new Set();
    let planToReadIds = new Set();

    function bookDocId(workKey) {
        return encodeURIComponent(workKey);
    }

    function clearUserLists() {
        favouriteIds.clear();
        planToReadIds.clear();
        ratingsMap.clear();
    }

    async function loadUserLists() {
        clearUserLists();

        const user = auth.currentUser;
        if (!user) return;

        const favSnap = await getDocs(collection(db, "users", user.uid, "favourites"));
        favSnap.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.workKey) {
                favouriteIds.add(data.workKey);
            }
        });

        const planSnap = await getDocs(collection(db, "users", user.uid, "planToRead"));
        planSnap.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.workKey) {
                planToReadIds.add(data.workKey);
            }
        });

        const ratingSnap = await getDocs(collection(db, "users", user.uid, "ratings"));
        ratingSnap.forEach((docSnap) => {
            const data = docSnap.data();
            if (data.workKey && typeof data.rating === "number") {
                ratingsMap.set(data.workKey, data.rating);
            }
        });
    }

    function isSaved(type, workKey) {
        return type === "favourites"
            ? favouriteIds.has(workKey)
            : planToReadIds.has(workKey);
    }

    function emptyRatingSummary() {
        return {
            count1: 0,
            count2: 0,
            count3: 0,
            count4: 0,
            count5: 0
        };
    }

    function getUserRating(workKey) {
        return ratingsMap.get(workKey) || 0;
    }

    function getRatingSummary(workKey) {
        return ratingSummaryMap.get(workKey) || emptyRatingSummary();
    }

    async function toggleSaved(type, bookData) {
        const user = auth.currentUser;

        if (!user) {
            alert("Please log in first.");
            openModal();
            return false;
        }

        const collectionName = type === "favourites" ? "favourites" : "planToRead";
        const docRef = doc(db, "users", user.uid, collectionName, bookDocId(bookData.workKey));
        const targetSet = type === "favourites" ? favouriteIds : planToReadIds;

        if (targetSet.has(bookData.workKey)) {
            await deleteDoc(docRef);
            targetSet.delete(bookData.workKey);
        } else {
            await setDoc(docRef, {
                ...bookData,
                savedAt: serverTimestamp()
            });
            targetSet.add(bookData.workKey);
        }

        return true;
    }

    async function setRating(bookData, newRating) {
        const user = auth.currentUser;

        if (!user) {
            alert("Please log in first to rate books.");
            openModal();
            return false;
        }

        const userRatingRef = doc(db, "users", user.uid, "ratings", bookDocId(bookData.workKey));
        const summaryRef = doc(db, "bookRatings", bookDocId(bookData.workKey));

        let updatedSummary = emptyRatingSummary();

        await runTransaction(db, async (transaction) => {
            const userRatingSnap = await transaction.get(userRatingRef);
            const summarySnap = await transaction.get(summaryRef);

            const oldRating = userRatingSnap.exists()
                ? Number(userRatingSnap.data().rating || 0)
                : 0;

            updatedSummary = summarySnap.exists()
                ? { ...emptyRatingSummary(), ...summarySnap.data() }
                : {
                    ...emptyRatingSummary(),
                    workKey: bookData.workKey,
                    title: bookData.title || "Untitled"
                };

            if (oldRating === newRating) {
                return;
            }

            if (oldRating >= 1 && oldRating <= 5) {
                updatedSummary[`count${oldRating}`] = Math.max(
                    0,
                    (updatedSummary[`count${oldRating}`] || 0) - 1
                );
            }

            updatedSummary[`count${newRating}`] =
                (updatedSummary[`count${newRating}`] || 0) + 1;

            transaction.set(userRatingRef, {
                workKey: bookData.workKey,
                title: bookData.title,
                author: bookData.author,
                coverId: bookData.coverId || null,
                rating: newRating,
                savedAt: serverTimestamp()
            }, { merge: true });

            transaction.set(summaryRef, updatedSummary, { merge: true });
        });

        ratingsMap.set(bookData.workKey, newRating);
        ratingSummaryMap.set(bookData.workKey, updatedSummary);

        return true;
    }

    function normalizeBook(book) {
        const coverId = book.cover_i || book.cover_id || null;
        const author =
            book.author_name?.[0] ||
            book.authors?.[0]?.name ||
            "Unknown Author";

        return {
            workKey: book.key,
            title: book.title || "Untitled",
            author: author,
            coverId: coverId
        };
    }

    async function loadRatingSummaries(books) {
        ratingSummaryMap.clear();

        const normalizedBooks = books.map(book => book.workKey ? book : normalizeBook(book));

        await Promise.all(
            normalizedBooks.map(async (bookData) => {
                const summaryRef = doc(db, "bookRatings", bookDocId(bookData.workKey));
                const summarySnap = await getDoc(summaryRef);

                if (summarySnap.exists()) {
                    ratingSummaryMap.set(bookData.workKey, {
                        ...emptyRatingSummary(),
                        ...summarySnap.data()
                    });
                } else {
                    ratingSummaryMap.set(bookData.workKey, emptyRatingSummary());
                }
            })
        );
    }

    function createStarsHTML(workKey, rating) {
        let html = `<div class="rating-row" data-workkey="${workKey}">`;

        for (let i = 1; i <= 5; i++) {
            html += `
                <button 
                    class="star-btn ${i <= rating ? "filled" : ""}" 
                    data-rating="${i}" 
                    title="Rate ${i} star${i > 1 ? "s" : ""}">
                    ★
                </button>
            `;
        }

        html += `</div>`;
        return html;
    }

    function createRatingSummaryHTML(workKey) {
        const summary = getRatingSummary(workKey);

        return `
            <div class="rating-summary">
                <span class="rating-chip">1★ ${summary.count1 || 0}</span>
                <span class="rating-chip">2★ ${summary.count2 || 0}</span>
                <span class="rating-chip">3★ ${summary.count3 || 0}</span>
                <span class="rating-chip">4★ ${summary.count4 || 0}</span>
                <span class="rating-chip">5★ ${summary.count5 || 0}</span>
            </div>
        `;
    }

    function getTopRatingData(workKey) {
    const summary = getRatingSummary(workKey);

    let bestRating = 0;
    let bestCount = 0;

    for (let rating = 1; rating <= 5; rating++) {
        const count = summary[`count${rating}`] || 0;

        if (count > bestCount || (count === bestCount && count > 0 && rating > bestRating)) {
            bestCount = count;
            bestRating = rating;
        }
    }

    return { bestRating, bestCount };
}

    function createTopRatingHTML(workKey) {
        const { bestRating, bestCount } = getTopRatingData(workKey);

        if (bestCount === 0) {
            return `<div class="top-rating-badge">No ratings yet</div>`;
        }

        return `<div class="top-rating-badge">Top: ${bestRating}★ (${bestCount})</div>`;
    }

    function renderGallery(books) {
        const gallery = document.getElementById('gallery');
       if (currentMode !== "personal") 
            gallery.innerHTML = "";
    

        if (!books || books.length === 0) {
            gallery.innerHTML = "<p>No books found.</p>";
            return;
        }

        books.forEach(book => {
            const bookData =book.workKey ? book : normalizeBook(book);
            const coverUrl = bookData.coverId
                ? `https://covers.openlibrary.org/b/id/${bookData.coverId}-M.jpg`
                : 'https://via.placeholder.com/200x300?text=No+Cover';

            const favActive = isSaved("favourites", bookData.workKey);
            const planActive = isSaved("planToRead", bookData.workKey);

            const card = document.createElement('div');
            card.className = 'book-card';

            card.innerHTML = `
                <div class="book-actions">
                    <button class="icon-btn plan-btn ${planActive ? "active" : ""}" title="Plan to Read">
                        <img src="${planActive ? "BookMarkFilled.jpg" : "BookMarkOutline.png"}" alt="Plan to Read">
                    </button>
                </div>

                <img src="${coverUrl}" alt="${bookData.title}">

                <div class="rating-block">
                    ${createStarsHTML(bookData.workKey, getUserRating(bookData.workKey))}
                    ${createTopRatingHTML(bookData.workKey)}
                </div>
               
                <div class="title-row">
                    <button class="icon-btn fav-btn ${favActive ? "active" : ""}" title="Favourite">
                        <img src="${favActive ? "HeartFilled.jpg" : "HeartOutline.jpg"}" alt="Favourite">
                    </button>
                    <h3>${bookData.title}</h3>
                </div>

                <small>${bookData.author}</small>
            `;

            card.addEventListener("click", () => {
                openBookModal(bookData);
            });

            const favBtn = card.querySelector(".fav-btn");
            const planBtn = card.querySelector(".plan-btn");
            const starBtns = card.querySelectorAll(".star-btn");

            favBtn.addEventListener("click", async (event) => {
                event.stopPropagation();
                const changed = await toggleSaved("favourites", bookData);
                if (changed) {
                    renderGallery(books);

                    if (currentModalBookData && currentModalBookData.workKey === bookData.workKey) {
                        updateModalRatingUI(currentModalBookData);
                    }
                }
            });

            planBtn.addEventListener("click", async (event) => {
                event.stopPropagation();
                const changed = await toggleSaved("planToRead", bookData);
                if (changed) {
                    renderGallery(books);

                    if (currentModalBookData && currentModalBookData.workKey === bookData.workKey) {
                        updateModalRatingUI(currentModalBookData);
                    }
                }
            });

            starBtns.forEach((starBtn) => {
                starBtn.addEventListener("click", async (event) => {
                    event.stopPropagation();

                    const rating = Number(starBtn.dataset.rating);
                    const changed = await setRating(bookData, rating);

                    if (changed) {
                        renderGallery(books);

                        if (currentModalBookData && currentModalBookData.workKey === bookData.workKey) {
                            updateModalRatingUI(currentModalBookData);
                        }
                    }
                });
            });

            gallery.appendChild(card);
        });
    }

    function updateResultsTitle() {
        const title = document.getElementById("resultsTitle");

        if (currentMode === "trending") {
            title.innerText = "Trending Books";
            title.style.display = "block";
        } else if (currentMode === "subject") {
            const genreName = currentGenre
                ? currentGenre.charAt(0).toUpperCase() + currentGenre.slice(1)
                : "Genre";
            title.innerText = `${genreName} Books`;
            title.style.display = "block";
        } else if (currentMode === "search") {
            title.style.display = "none";
        }
    }

   function updatePaginationUI(totalResults) {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');

        if (currentMode === "trending") {
            pageIndicator.innerText = "Trending";
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = true;
            return;
        }

        const totalPages = Math.ceil(totalResults / limit) || 1;
        pageIndicator.innerText = `Page ${currentPage} of ${totalPages}`;
        prevBtn.disabled = (currentPage === 1);
        nextBtn.disabled = (currentPage >= totalPages);
    }


    

  
    function newSearch() {
        currentQuery = document.getElementById('searchInput').value.trim();
        currentGenre = document.getElementById('genreFilter').value;
        currentPage = 1;
        fetchBooks(currentQuery, currentPage, currentGenre);
    }

    window.newSearch = newSearch; 

    document.getElementById("genreFilter").addEventListener("change", () => {
        newSearch();
    });

    document.getElementById("searchInput").addEventListener("input", () => {
        clearTimeout(searchTimer);

        searchTimer = setTimeout(() => {
            newSearch();
        }, 500);
    });

    function changePage(step) {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if ((step < 0 && prevBtn.disabled) || (step > 0 && nextBtn.disabled)) {
            return;
        }

        currentPage += step;
        fetchBooks(currentQuery, currentPage, currentGenre);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.changePage = changePage; 
    
    window.onload = async () => {
        currentPage = 1;
        currentQuery = document.getElementById("searchInput").value.trim();
        currentGenre = document.getElementById("genreFilter").value;
        fetchBooks(currentQuery, currentPage, currentGenre);
    };

    const navBtn = document.getElementById('nav-login-btn');
    const modal = document.getElementById('auth-modal-overlay');
    const closeBtn = document.getElementById('close-modal-btn');
    const toSignupLink = document.getElementById('link-to-signup');
    const toLoginLink = document.getElementById('link-to-login');
    
    const loginView = document.getElementById('login-form-container');
    const signupView = document.getElementById('signup-form-container');

    
    const openModal = () => {
        modal.style.display = 'flex';
        modal.style.position = 'fixed';
        modal.style.inset = '0';
        modal.style.backgroundColor = 'rgba(255,255,255,0.95)';
        modal.style.zIndex = '10000';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
    };

    const closeModal = () => {
        modal.style.display = 'none';
    };

    
    navBtn.onclick = openModal;
    closeBtn.addEventListener('click', closeModal);

    toSignupLink.addEventListener('click', () => {
        loginView.style.display = 'none';
        signupView.style.display = 'block';
    });

    toLoginLink.addEventListener('click', () => {
        signupView.style.display = 'none';
        loginView.style.display = 'block';
    });

  
    document.getElementById('submit-login').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("Logged in!");
            closeModal();
        } catch (e) {
            alert(e.message);
        }
    });

    document.getElementById('submit-signup').addEventListener('click', async () => {
        const email = document.getElementById('signup-email').value;
        const pass = document.getElementById('signup-password').value;
        
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Account created!");
            closeModal();
        } catch (error) {
            alert("Sign Up Error: " + error.message);
        }
    });


    onAuthStateChanged(auth, async (user) => {
        if (user) {
            navBtn.innerText = "Logout";
            navBtn.onclick = () => signOut(auth);
        } else {
            navBtn.innerText = "Login";
            navBtn.onclick = openModal;
        }

        await loadUserLists();
    });

  
    async function renderUserList(type) {
        currentListType = type;
        const user = auth.currentUser;
        if (!user) {
            alert("Please log in to view your lists.");
            openModal();
            return;
        }

        const gallery = document.getElementById('gallery');
        const title = document.getElementById('resultsTitle');
        const pagination = document.querySelector('.pagination');
        const searchSection = document.querySelector('.search-section');

        gallery.innerHTML = "<p>Loading your list...</p>";
        currentMode = "personal"; // Custom mode to handle UI changes

        // Hide search and pagination for a "clean" list view
        pagination.style.display = "none";
        searchSection.style.display = "none";
        title.innerText = type === "favourites" ? "My Favorites" : "My Plan to Read List";

        try {
            const collectionName = type === "favourites" ? "favourites" : "planToRead";
            const snap = await getDocs(collection(db, "users", user.uid, collectionName));
            
            const books = [];
            snap.forEach(docSnap => books.push(docSnap.data()));

            if (books.length === 0) {
                gallery.innerHTML = `<p>Your ${type} list is empty.</p>
                                    <button class="back-btn" onclick="resetToSearch()">Go Back to Search</button>`;
            } else {
                // Add a back button at the top of the gallery
                gallery.innerHTML = `<button class="back-btn" onclick="resetToSearch()">← Back to Search</button><div></div>`;
                lastRenderedBooks = books;
                renderGallery(books);
            }
        } catch (e) {
            console.error(e);
            gallery.innerHTML = "<p>Error loading your list.</p>";
        }
    }

    // --- 2. The Reset Function ---
    window.resetToSearch = () => {
        const pagination = document.querySelector('.pagination');
        const searchSection = document.querySelector('.search-section');
        
        currentListType = null;
        pagination.style.display = "flex";
        searchSection.style.display = "block";
        
        // Refresh trending/search
        fetchBooks(currentQuery, currentPage, currentGenre);
    };

    // --- 3. Event Listeners for Nav Buttons ---
    document.getElementById('nav-favs-btn').onclick = () => renderUserList('favourites');
    document.getElementById('nav-plan-btn').onclick = () => renderUserList('planToRead');

    function updateModalActionIcons(bookData) {
        const favActive = isSaved("favourites", bookData.workKey);
        const planActive = isSaved("planToRead", bookData.workKey);

        document.getElementById("modalFavIcon").src = favActive ? "HeartFilled.jpg" : "HeartOutline.jpg";
        document.getElementById("modalPlanIcon").src = planActive ? "BookMarkFilled.jpg" : "BookMarkOutline.png";

        document.getElementById("modalFavBtn").classList.toggle("active", favActive);
        document.getElementById("modalPlanBtn").classList.toggle("active", planActive);
    }

    function updateModalRatingUI(bookData) {
        document.getElementById("modalStars").innerHTML =
            createStarsHTML(bookData.workKey, getUserRating(bookData.workKey));

        document.getElementById("modalRatingSummary").innerHTML =
            createRatingSummaryHTML(bookData.workKey);

        const modalStarBtns = document.querySelectorAll("#modalStars .star-btn");

        modalStarBtns.forEach((starBtn) => {
            starBtn.addEventListener("click", async (event) => {
                event.stopPropagation();

                const rating = Number(starBtn.dataset.rating);
                const changed = await setRating(bookData, rating);

                if (changed) {
                    updateModalRatingUI(bookData);
                    renderGallery(lastRenderedBooks);
                }
            });
        });
    }

    async function openBookModal(bookData) {
        const overlay = document.getElementById("book-modal-overlay");

        currentModalBookData = { ...bookData };

        document.getElementById("modalBookCover").src = bookData.coverId
            ? `https://covers.openlibrary.org/b/id/${bookData.coverId}-L.jpg`
            : "https://via.placeholder.com/300x450?text=No+Cover";

        document.getElementById("modalBookTitle").innerText = bookData.title || "Untitled";
        document.getElementById("modalBookAuthor").innerText = bookData.author || "Unknown Author";
        document.getElementById("modalBookDescription").innerText = "Loading...";
        document.getElementById("modalBookSubjects").innerText = "Loading...";

        updateModalActionIcons(currentModalBookData);
        updateModalRatingUI(currentModalBookData);
        overlay.classList.add("active");

        try {
            const response = await fetch(`https://openlibrary.org${bookData.workKey}.json`);
            const data = await response.json();

            let description = "No description available.";
            if (typeof data.description === "string") {
                description = data.description;
            } else if (data.description && data.description.value) {
                description = data.description.value;
            }

            document.getElementById("modalBookTitle").innerText = data.title || bookData.title || "Untitled";
            document.getElementById("modalBookDescription").innerText = description;

            if (data.subjects && data.subjects.length) {
                document.getElementById("modalBookSubjects").innerText = data.subjects.slice(0, 10).join(", ");
            } else {
                document.getElementById("modalBookSubjects").innerText = "No subjects available.";
            }
        } catch (error) {
            document.getElementById("modalBookDescription").innerText = "Error loading book details.";
            document.getElementById("modalBookSubjects").innerText = "Please try again.";
        }
    }

    function closeBookModal() {
        document.getElementById("book-modal-overlay").classList.remove("active");
        currentModalBookData = null;
    }
  
  
    function buildSearchQuery(query, genre) {
        const parts = [];

        if (query.trim()) {
            const words = query
                .trim()
                .toLowerCase()
                .split(/\s+/)
                .map(word => `${word}*`)
                .join(" AND ");

            parts.push(`title:(${words})`);
        }

        if (genre.trim()) {
            parts.push(`subject:"${genre.trim()}"`);
        }

        return parts.join(" AND ");
    }

    document.getElementById("book-modal-overlay").addEventListener("click", (event) => {
        if (event.target.id === "book-modal-overlay") {
            closeBookModal();
        }
    });

    document.getElementById("modalFavBtn").addEventListener("click", async () => {
        if (!currentModalBookData) return;
        const changed = await toggleSaved("favourites", currentModalBookData);
        if (changed) {
            updateModalActionIcons(currentModalBookData);
            renderGallery(lastRenderedBooks);
        }
    });

    document.getElementById("modalPlanBtn").addEventListener("click", async () => {
        if (!currentModalBookData) return;
        const changed = await toggleSaved("planToRead", currentModalBookData);
        if (changed) {
            updateModalActionIcons(currentModalBookData);
            renderGallery(lastRenderedBooks);
        }
    });

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
            closeBookModal();
        }
    });

    document.getElementById('close-modal-btn').onclick = closeModal;
    document.getElementById("book-modal-close").addEventListener("click", closeBookModal);


</script>
