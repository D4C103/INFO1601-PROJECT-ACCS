<!DOCTYPE html>
<html>
  <head>
    <link rel="manifest" href="/public/manifest.json">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-section {
            text-align: center;
            margin-bottom: 40px;
        }

        input[type="text"] {
            padding: 15px;
            padding-left: 30px;
            width: 300px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:disabled { background-color: #ccc; }

        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .book-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            margin: 20px;
        }

        .book-card h3 {
            font-size: 1rem;
            margin: 10px 0 5px 0;
            color: var(--primary);
            height: 2.4em;
            overflow: hidden;
        }

       
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        #pageIndicator { font-weight: bold; }
          .modal-box {
        background-color: #ffffff !important;
        color: #333 !important;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 400px;
       
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); 
        border: 1px solid #f0f0f0;
        text-align: center;
    }

    .modal-box h2 {
        margin-bottom: 20px;
        font-family: sans-serif;
    }

  
    .modal-box input {
        background: #f9f9f9;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        margin-bottom: 15px;
    }
    </style>
  </head>
<body>
  <nav>   <button id="nav-login-btn">Login</button></nav>
  <div id="auth-modal-overlay" style="display: none;">
    <div class="modal-box">
        <div id="login-form-container">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button id="submit-login">Sign In</button>
            <p>New? <span id="link-to-signup" style="color:blue; cursor:pointer">Sign Up</span></p>
        </div>

        <div id="signup-form-container" style="display: none;">
            <h2>Sign Up</h2>
            <input type="email" id="signup-email" placeholder="Email">
            <input type="password" id="signup-password" placeholder="Password">
            <button id="submit-signup">Register</button>
            <p>Back to <span id="link-to-login" style="color:blue; cursor:pointer">Login</span></p>
        </div>
        <button id="close-modal-btn">Close</button>
    </div>
</div>
  <div class="container">
    <div class="search-section">
        <h1>LUME</h1>
        <input type="text" id="searchInput" placeholder="Search by title or author..." value="The Lord of the Rings">
        <button onclick="newSearch()">Search</button>
    </div>

    <div id="gallery" class="gallery">
        </div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageIndicator">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
   

    </div>
</div>

</body>
<script type="module">
    import firebaseConfig  from "./firebaseConfig.js";
    
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

   
    import {
     getAuth,
     createUserWithEmailAndPassword,
     signInWithEmailAndPassword,
     signOut,
     onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

   
    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      updateDoc,
      arrayUnion,
      arrayRemove,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app); 
    const db = getFirestore(app); 


   let currentPage = 1;
    let currentQuery = "";
    const limit = 12; 

    async function fetchBooks(query, page) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p>Searching for books...</p>";

      
        const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&page=${page}&limit=${limit}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            renderGallery(data.docs);
            updatePaginationUI(data.numFound);
        } catch (error) {
            gallery.innerHTML = "<p>Error loading data. Please try again later.</p>";
        }
    }

    function renderGallery(books) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "";

        if (books.length === 0) {
            gallery.innerHTML = "<p>No books found.</p>";
            return;
        }

        books.forEach(book => {
            const coverId = book.cover_i;
            const coverUrl = coverId
                ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg`
                : 'https://via.placeholder.com/200x300?text=No+Cover';

            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="${coverUrl}" alt="${book.title}">
                <h3>${book.title}</h3>
                <small>${book.author_name ? book.author_name[0] : 'Unknown Author'}</small>
            `;
            gallery.appendChild(card);
        });
    }

    function updatePaginationUI(totalResults) {
        const totalPages = Math.ceil(totalResults / limit);
        document.getElementById('pageIndicator').innerText = `Page ${currentPage} of ${totalPages || 1}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage >= totalPages);
    }

    function newSearch() {
        currentQuery = document.getElementById('searchInput').value;
        currentPage = 1;
        if (currentQuery) fetchBooks(currentQuery, currentPage);
    }
    window.newSearch = newSearch; 

    function changePage(step) {
        currentPage += step;
        fetchBooks(currentQuery, currentPage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    window.changePage = changePage; 

    
    window.onload = () => {
        currentQuery = document.getElementById('searchInput').value;
        fetchBooks(currentQuery, currentPage);
    };
      const navBtn = document.getElementById('nav-login-btn');
    const modal = document.getElementById('auth-modal-overlay');
    const closeBtn = document.getElementById('close-modal-btn');
    const toSignupLink = document.getElementById('link-to-signup');
    const toLoginLink = document.getElementById('link-to-login');
    
    const loginView = document.getElementById('login-form-container');
    const signupView = document.getElementById('signup-form-container');

    
    const openModal = () => {
        modal.style.display = 'flex';
        modal.style.position = 'fixed';
        modal.style.inset = '0';
        modal.style.backgroundColor = 'rgba(255,255,255,0.95)';
        modal.style.zIndex = '10000';
        modal.style.justifyContent = 'center';
        modal.style.alignItems = 'center';
    };

    const closeModal = () => {
        modal.style.display = 'none';
    };

    
    navBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);

    toSignupLink.addEventListener('click', () => {
        loginView.style.display = 'none';
        signupView.style.display = 'block';
    });

    toLoginLink.addEventListener('click', () => {
        signupView.style.display = 'none';
        loginView.style.display = 'block';
    });

  
    document.getElementById('submit-login').addEventListener('click', async () => {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("Logged in!");
            closeModal();
        } catch (e) {
            alert(e.message);
        }
    });
    document.getElementById('submit-signup').addEventListener('click', async () => {
    const email = document.getElementById('signup-email').value;
    const pass = document.getElementById('signup-password').value;
    
    try {
        await createUserWithEmailAndPassword(auth, email, pass);
        alert("Account created!");
        closeModal();
    } catch (error) {
        alert("Sign Up Error: " + error.message);
    }
});


onAuthStateChanged(auth, (user) => {
    if (user) {
        navBtn.innerText = "Logout";
        navBtn.onclick = () => signOut(auth);
    } else {
        navBtn.innerText = "Login";
        navBtn.onclick = openModal;
    }
});


document.getElementById('close-modal-btn').onclick = closeModal;


</script>
</html>
