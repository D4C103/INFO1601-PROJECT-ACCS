<!DOCTYPE html>
<html>
  <head>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .search-section {
            text-align: center;
            margin-bottom: 40px;
        }

        input[type="text"] {
            padding: 12px;
            width: 300px;
            border: 2px solid #ddd;
            border-radius: 25px;
            outline: none;
        }

        button {
            padding: 12px 25px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:disabled { background-color: #ccc; }

        /* Gallery Pattern */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .book-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .book-card h3 {
            font-size: 1rem;
            margin: 10px 0 5px 0;
            color: var(--primary);
            height: 2.4em;
            overflow: hidden;
        }

        /* Pagination Controls */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }

        #pageIndicator { font-weight: bold; }
    </style>
  </head>
<body>
  <nav></nav>
  <div class="container">
    <div class="search-section">
        <h1>LUME</h1>
        <input type="text" id="searchInput" placeholder="Search by title or author..." value="The Lord of the Rings">
        <button onclick="newSearch()">Search</button>
    </div>

    <div id="gallery" class="gallery">
        </div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)" disabled>Previous</button>
        <span id="pageIndicator">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next</button>
   

    </div>
</div>

</body>
<script>
   let currentPage = 1;
    let currentQuery = "";
    const limit = 12; // Books per page

    async function fetchBooks(query, page) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p>Searching for books...</p>";

        // Open Library API uses 'page' parameter for pagination
        const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&page=${page}&limit=${limit}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            renderGallery(data.docs);
            updatePaginationUI(data.numFound);
        } catch (error) {
            gallery.innerHTML = "<p>Error loading data. Please try again later.</p>";
        }
    }

    function renderGallery(books) {
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "";

        if (books.length === 0) {
            gallery.innerHTML = "<p>No books found.</p>";
            return;
        }

        books.forEach(book => {
            const coverId = book.cover_i;
            const coverUrl = coverId
                ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg`
                : 'https://via.placeholder.com/200x300?text=No+Cover';

            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="${coverUrl}" alt="${book.title}">
                <h3>${book.title}</h3>
                <small>${book.author_name ? book.author_name[0] : 'Unknown Author'}</small>
            `;
            gallery.appendChild(card);
        });
    }

    function updatePaginationUI(totalResults) {
        const totalPages = Math.ceil(totalResults / limit);
        document.getElementById('pageIndicator').innerText = `Page ${currentPage} of ${totalPages || 1}`;
        document.getElementById('prevBtn').disabled = (currentPage === 1);
        document.getElementById('nextBtn').disabled = (currentPage >= totalPages);
    }

    function newSearch() {
        currentQuery = document.getElementById('searchInput').value;
        currentPage = 1;
        if (currentQuery) fetchBooks(currentQuery, currentPage);
    }

    function changePage(step) {
        currentPage += step;
        fetchBooks(currentQuery, currentPage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initial Load
    window.onload = () => {
        currentQuery = document.getElementById('searchInput').value;
        fetchBooks(currentQuery, currentPage);
    };

</script>
</html>
